name: 自动爬取增强部署
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  crawl-enhance-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行爬虫
        run: timeout 1500 python crawler.py || true
        timeout-minutes: 30

      - name: TMDB增强
        run: python enhance.py
        timeout-minutes: 30
        continue-on-error: true

      - name: 提交 data.js
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "自动更新 data.js [skip ci]"
          git push || true

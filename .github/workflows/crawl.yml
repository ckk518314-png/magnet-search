name: TMDB增强+Cloudflare部署
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  enhance-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: TMDB增强（海报/评分/中文名）
        run: python enhance.py
        timeout-minutes: 30
        continue-on-error: true

      - name: 提交 data.js
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "自动更新 data.js [skip ci]"
          git push || true

      - name: 部署到 Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: magnet-search
          directory: .
          branch: main

name: 自动爬取增强部署
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  crawl-enhance-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 执行爬虫
        run: python crawler.py
        timeout-minutes: 10
        continue-on-error: true

      - name: 豆瓣增强（海报/简介/评分）
        run: python enhance.py
        timeout-minutes: 30

      - name: 提交 data.js
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "自动更新 data.js [skip ci]"
          git push

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 部署到 Cloudflare Pages
        run: |
          npm install -g wrangler
          npx wrangler pages deploy . --project-name=magnet-search --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

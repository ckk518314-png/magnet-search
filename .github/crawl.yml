name: 每日抓取磁力

on:
  schedule:
    # 每天 UTC 0:00 (=北京时间 8:00) 跑一次
    - cron: "0 0 * * *"
  # 也支持手动触发(在 GitHub 网页上点 Run workflow)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python crawler.py

      - name: Commit & push
        run: |
          git config user.name "Magnet Bot"
          git config user.email "bot@magnet.local"
          git add data.js
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "crawl: update magnet pool"
            git push
          fi

<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>磁力搜索</title><style>body{font-family:system-ui;max-width:1100px;margin:20px auto;padding:10px;background:#f5f7fa}.box{background:#fff;padding:20px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08)}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:10px 0}input,select,button{padding:10px 14px;border:1px solid #d0d7de;border-radius:8px;font-size:15px;background:#fff}input{flex:2;min-width:180px}select{flex:1;min-width:100px}button{background:#2d7aff;color:#fff;border:none;cursor:pointer;font-weight:600}.status{margin:8px 0;font-weight:500;color:#1e7e34}.item{border-bottom:1px solid #e9ecf0;padding:16px 0}.item strong{font-size:16px}.meta{display:flex;flex-wrap:wrap;gap:12px;margin:6px 0;font-size:14px;color:#57606a}.magnet-link{word-break:break-all;background:#f0f2f5;padding:4px 10px;border-radius:6px;display:inline-block}a{color:#2d7aff;text-decoration:none}.no-result{color:#8b949e;padding:30px 0;text-align:center}.badge{background:#ddf4ff;color:#0550ae;padding:2px 8px;border-radius:12px;font-size:12px}.seed{color:#1a7f37}.leech{color:#cf222e}@media(max-width:600px){.row{flex-direction:column;align-items:stretch}}.copy-btn{background:#e6f7e6;color:#1e7e34;border:1px solid #b7e0b7;padding:2px 10px;border-radius:12px;font-size:12px;cursor:pointer;margin-left:8px}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity 0.3s;z-index:999}.toast.show{opacity:1}</style></head><body><div class="box"><h2>🧲 磁力搜索</h2><div class="row"><input id="searchInput" placeholder="输入关键词..." onkeyup="search()"><button onclick="search()">搜索</button></div><div id="status" class="status">加载数据中...</div><div class="row"><select id="categoryFilter"><option value="">全部</option><option value="4K HDR">4K HDR</option><option value="1080p">1080p</option><option value="剧集">剧集</option><option value="动漫">动漫</option><option value="纪录片">纪录片</option></select><select id="sizeFilter"><option value="">全部大小</option><option value="1">>1GB</option><option value="5">>5GB</option><option value="10">>10GB</option><option value="50">>50GB</option><option value="100">>100GB</option><option value="500">>500GB</option><option value="1000">>1TB</option><option value="10000">>10TB</option></select><select id="sortBy"><option value="name">按名称</option><option value="size">按大小</option><option value="seed">按种子数</option><option value="date">按日期</option></select></div><div id="results"></div></div><div id="toast" class="toast">已复制</div><script>let allData=[];const toast=document.getElementById('toast');function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}fetch('data.js?t='+Date.now()).then(r=>r.ok?r.text():Promise.reject()).then(t=>{let m=t.match(/window\.MAGNET_DATA\s*=\s*([\s\S]*?);/);if(m){allData=JSON.parse(m[1]);document.getElementById('status').innerHTML='✅ 已加载 '+allData.length+' 条磁力资源'}}).catch(e=>{document.getElementById('status').innerHTML='⚠️ 加载失败'});function search(){let k=document.getElementById('searchInput').value.trim().toLowerCase(),c=document.getElementById('categoryFilter').value,s=parseFloat(document.getElementById('sizeFilter').value)||0,t=document.getElementById('sortBy').value,res=document.getElementById('results');if(!k&&!c&&!s){res.innerHTML='';return}let f=allData.filter(i=>{let n=(i.name||'').toLowerCase();return n.includes(k)&&(!c||(i.category||'')===c)&&(parseFloat((i.size||'0').replace(/[^0-9.]/g,''))||0)>=s});if(t==='name')f.sort((a,b)=>(a.name||'').localeCompare(b.name||''));else if(t==='size')f.sort((a,b)=>(parseFloat((b.size||'0').replace(/[^0-9.]/g,''))||0)-(parseFloat((a.size||'0').replace(/[^0-9.]/g,''))||0));else if(t==='seed')f.sort((a,b)=>(parseInt(b.seed)||0)-(parseInt(a.seed)||0));else if(t==='date')f.sort((a,b)=>new Date(b.date)-new Date(a.date));if(!f.length){res.innerHTML='<div class="no-result">😅 没找到相关资源</div>';return}let html='<p>🎯 找到 '+f.length+' 个结果</p>';f.slice(0,100).forEach(i=>{const mag=i.magnet||'';html+='<div class="item"><div><strong>'+(i.name||'未知')+'</strong>'+(i.size?' 📦 '+i.size:'')+'</div><div class="meta">'+(i.seed?'<span class="seed">🌱 种子 '+i.seed+'</span>':'')+(i.leech?'<span class="leech">🧲 做种 '+i.leech+'</span>':'')+(i.date?'📅 '+i.date:'')+(i.source?'<span class="badge">'+i.source+'</span>':'')+'</div><div><span class="magnet-link">🔗 '+mag.slice(0,80)+'...</span><button class="copy-btn" onclick="copyMagnet(\''+mag+'\')">📋 复制</button></div></div>'});res.innerHTML=html}function copyMagnet(mag){if(!mag){showToast('无磁力链接');return}navigator.clipboard.writeText(mag).then(()=>{showToast('✅ 已复制磁力链接')}).catch(()=>{const ta=document.createElement('textarea');ta.value=mag;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('✅ 已复制磁力链接')})}document.getElementById('categoryFilter').addEventListener('change',search);document.getElementById('sizeFilter').addEventListener('change',search);document.getElementById('sortBy').addEventListener('change',search);</script></body></html>

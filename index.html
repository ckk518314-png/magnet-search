<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>磁力搜索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 20px;position:sticky;top:0;z-index:100}
header h1{font-size:22px;color:#58a6ff;font-weight:700}
.container{max-width:1200px;margin:0 auto;padding:20px}
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:2;min-width:200px;padding:12px 16px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;font-size:15px;outline:none}
.search-bar input:focus{border-color:#58a6ff}
.search-bar select,.search-bar button{padding:12px 16px;border:1px solid #30363d;border-radius:8px;font-size:14px;cursor:pointer;background:#21262d;color:#c9d1d9}
.search-bar button{background:#238636;border-color:#238636;color:#fff;font-weight:600;min-width:80px}
.search-bar button:hover{background:#2ea043}
.status{margin-bottom:12px;font-size:14px;color:#8b949e}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s}
.card:hover{transform:translateY(-2px);border-color:#58a6ff}
.card-poster{width:100%;aspect-ratio:2/3;background:#21262d;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-poster img{width:100%;height:100%;object-fit:cover}
.card-poster .placeholder{font-size:48px;color:#484f58;font-weight:700}
.card-body{padding:12px}
.card-body h3{font-size:15px;font-weight:600;color:#e6edf3;margin-bottom:6px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;font-size:12px;color:#8b949e}
.card-meta .tag{background:#21262d;border:1px solid #30363d;padding:2px 8px;border-radius:12px;color:#58a6ff;font-size:11px}
.card-meta .size{color:#d2a8ff}
.card-meta .rating{color:#f0883e;font-weight:600}

.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:200;justify-content:center;align-items:flex-start;overflow-y:auto;padding:20px}
.overlay.show{display:flex}
.detail{background:#161b22;border:1px solid #30363d;border-radius:16px;max-width:700px;width:100%;margin:20px auto;position:relative}
.detail-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#8b949e;font-size:24px;cursor:pointer;z-index:1;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.detail-close:hover{background:#21262d;color:#e6edf3}
.detail-header{display:flex;gap:20px;padding:24px 24px 0}
.detail-poster{width:140px;min-width:140px;border-radius:8px;overflow:hidden;background:#21262d;aspect-ratio:2/3}
.detail-poster img{width:100%;height:100%;object-fit:cover}
.detail-poster .placeholder{font-size:36px;color:#484f58;display:flex;align-items:center;justify-content:center;height:100%}
.detail-info{flex:1;min-width:0}
.detail-info h2{font-size:22px;color:#e6edf3;margin-bottom:10px;line-height:1.3}
.detail-info .meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:13px}
.detail-info .meta-tag{background:#21262d;padding:4px 10px;border-radius:12px;color:#58a6ff;font-size:12px}
.detail-info .rating-big{font-size:18px;color:#f0883e;font-weight:700}
.detail-info .overview{font-size:14px;color:#8b949e;line-height:1.6;margin-bottom:10px}
.detail-info .cast-row{font-size:13px;color:#8b949e;margin-bottom:4px}
.detail-body{padding:0 24px 24px}
.detail-body .section-title{font-size:14px;font-weight:600;color:#e6edf3;margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid #30363d}
.file-info{font-size:13px;color:#8b949e;line-height:1.8}
.file-info span{color:#e6edf3}
.magnet-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:12px;margin-top:8px;word-break:break-all;font-size:13px;color:#7ee787;line-height:1.6}
.copy-btn{display:inline-block;margin-top:10px;padding:8px 20px;background:#238636;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600}
.copy-btn:hover{background:#2ea043}
.copy-btn.copied{background:#1f6feb}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:600px){
  .container{padding:12px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .card-body h3{font-size:13px}
  .detail-header{flex-direction:column;align-items:center;text-align:center}
  .detail-poster{width:120px;min-width:120px}
  .search-bar{flex-direction:column}
}
</style>
</head>
<body>
<header><h1>磁力搜索</h1></header>
<div class="container">
  <div class="search-bar">
    <input id="searchInput" placeholder="搜索电影、剧集、动漫..." onkeyup="search()">
    <select id="categoryFilter"><option value="">全部分类</option><option value="4K HDR">4K HDR</option><option value="1080p">1080p</option><option value="剧集">剧集</option><option value="动漫">动漫</option><option value="纪录片">纪录片</option></select>
    <select id="sizeFilter"><option value="">全部大小</option><option value="1">>1GB</option><option value="5">>5GB</option><option value="10">>10GB</option><option value="50">>50GB</option><option value="100">>100GB</option></select>
    <button onclick="search()">搜索</button>
  </div>
  <div id="status" class="status">加载数据中...</div>
  <div id="grid" class="grid"></div>
</div>

<div id="overlay" class="overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detailBox"></div>
</div>

<div id="toast" class="toast">已复制</div>

<script>
let allData=[];
const toast=document.getElementById('toast');

function showToast(msg){
  toast.textContent=msg;toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),1500);
}

fetch('data.js?t='+Date.now())
  .then(r=>r.text())
  .then(t=>{
    let m=t.match(/window\.MAGNET_DATA\s*=\s*([\s\S]*?);/);
    if(m){allData=JSON.parse(m[1]);document.getElementById('status').innerHTML='已加载 '+allData.length+' 条资源';renderGrid(allData.slice(0,60))}
  })
  .catch(()=>document.getElementById('status').innerHTML='加载失败');

function renderGrid(data){
  let g=document.getElementById('grid');
  if(!data.length){g.innerHTML='<p style="grid-column:1/-1;text-align:center;color:#8b949e;padding:40px">没找到相关资源</p>';return}
  let html='';
  data.forEach(i=>{
    let poster=i.poster||'';
    let initial=(i.name||'?')[0].toUpperCase();
    let escaped=encodeURIComponent(JSON.stringify(i));
    html+=`<div class="card" onclick="openDetail('${escaped}')">
      <div class="card-poster">${poster?`<img src="${poster}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=placeholder>${initial}</div>'">`:`<div class="placeholder">${initial}</div>`}</div>
      <div class="card-body">
        <h3>${(i.name||'未知').replace(/\./g,' ')}</h3>
        <div class="card-meta">
          ${i.rating?`<span class="rating">★ ${i.rating}</span>`:''}
          <span class="size">${i.size||''}</span>
          ${i.genres?i.genres.split(',').slice(0,2).map(g=>`<span class="tag">${g.trim()}</span>`).join(''):''}
          ${i.category?`<span class="tag">${i.category}</span>`:''}
        </div>
      </div>
    </div>`;
  });
  g.innerHTML=html;
}

function search(){
  let k=document.getElementById('searchInput').value.trim().toLowerCase(),
      c=document.getElementById('categoryFilter').value,
      s=parseFloat(document.getElementById('sizeFilter').value)||0;
  let f=allData.filter(i=>{
    let n=(i.name||'').toLowerCase();
    return n.includes(k)&&(!c||(i.category||'')===c)&&(parseFloat((i.size||'0').replace(/[^0-9.]/g,''))||0)>=s;
  });
  document.getElementById('status').innerHTML='找到 '+f.length+' 个结果';
  renderGrid(f.slice(0,80));
}

function openDetail(escaped){
  let item=JSON.parse(decodeURIComponent(escaped));
  let overlay=document.getElementById('overlay');
  let box=document.getElementById('detailBox');
  let poster=item.poster||'';
  let initial=(item.name||'?')[0].toUpperCase();
  let info=[
    item.rating?`<span class="rating-big">★ ${item.rating}</span>`:'',
    item.year?`<span class="meta-tag">${item.year}</span>`:'',
    item.category?`<span class="meta-tag">${item.category}</span>`:'',
    item.genres?item.genres.split(',').map(g=>`<span class="meta-tag">${g.trim()}</span>`).join(''):''
  ].filter(Boolean).join('');

  box.innerHTML=`
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-header">
      <div class="detail-poster">${poster?`<img src="${poster}" alt="" onerror="this.parentElement.innerHTML='<div class=placeholder>${initial}</div>'">`:`<div class="placeholder">${initial}</div>`}</div>
      <div class="detail-info">
        <h2>${(item.name||'未知').replace(/\./g,' ')}</h2>
        <div class="meta-row">${info}</div>
        ${item.director?`<div class="cast-row">导演：${item.director}</div>`:''}
        ${item.cast?`<div class="cast-row">主演：${item.cast}</div>`:''}
        ${item.overview?`<p class="overview">${item.overview}</p>`:''}
      </div>
    </div>
    <div class="detail-body">
      <div class="section-title">文件信息</div>
      <div class="file-info">
        大小：<span>${item.size||'未知'}</span> &nbsp;|&nbsp;
        来源：<span>${item.source||'未知'}</span>
        ${item.seed?` &nbsp;|&nbsp; 种子：<span>${item.seed}</span>`:''}
        ${item.date?` &nbsp;|&nbsp; 日期：<span>${item.date}</span>`:''}
      </div>
      <div class="section-title">磁力链接</div>
      <div class="magnet-box">${item.magnet||'无'}</div>
      <button class="copy-btn" onclick="copyMagnet(this,'${(item.magnet||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">复制磁力链接</button>
    </div>`;
  overlay.classList.add('show');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow='';
}

function copyMagnet(btn,mag){
  navigator.clipboard.writeText(mag).then(()=>{
    btn.textContent='已复制';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制磁力链接';btn.classList.remove('copied')},2000);
  }).catch(()=>{
    let ta=document.createElement('textarea');ta.value=mag;
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent='已复制';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='复制磁力链接';btn.classList.remove('copied')},2000);
  });
}

document.getElementById('categoryFilter').addEventListener('change',search);
document.getElementById('sizeFilter').addEventListener('change',search);
</script>
</body>
</html>
